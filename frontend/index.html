<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Clothings | Premium Fashion</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  
  <style>
    :root {
      --primary: #FF3F6C;
      --primary-dark: #cc3054;
      --secondary: #111111;
      --text: #282c3f;
      --text-light: #7e818c;
      --bg: #FFFFFF;
      --bg-alt: #F5F5F6;
      --border: #EAEAEC;
      
      --font-brand: 'Montserrat', sans-serif;
      --font-body: 'Inter', sans-serif;
      
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 30px rgba(0,0,0,0.15);
      
      --radius: 4px;
      --transition: all 0.25s ease-in-out;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; font-size: 16px; font-family: var(--font-body); }
    body { background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    
    a { text-decoration: none; color: inherit; cursor: pointer; }
    img { max-width: 100%; display: block; }
    ul { list-style: none; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; border-radius: var(--radius); transition: var(--transition); }
    .btn-solid { background: var(--primary); color: #fff; }
    .btn-solid:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .btn-dark { background: var(--secondary); color: #fff; }
    .btn-dark:hover { background: #000; transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .btn-outline { background: #fff; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--secondary); }
    .btn-block { width: 100%; padding: 15px; }

    /* ANIMATIONS */
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes heartPulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    .badge-pop { animation: bounce 0.3s ease-in-out; }
    .heart-pulse i { animation: heartPulse 0.3s ease-out; color: var(--primary) !important; }

    .header { position: sticky; top: 0; z-index: 1000; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); box-shadow: var(--shadow-sm); }
    .header-inner { display: flex; align-items: center; justify-content: space-between; height: 80px; padding: 0 40px; max-width: 1600px; margin: 0 auto; }
    
    .logo { font-family: var(--font-brand); font-weight: 800; font-size: 1.8rem; letter-spacing: 1px; color: var(--secondary); display: flex; align-items: center; gap: 5px; }
    .logo span { color: var(--primary); }

    .nav-links { display: flex; gap: 30px; height: 100%; align-items: center; }
    .nav-item { position: relative; height: 100%; display: flex; align-items: center; }
    .nav-link { font-weight: 600; font-size: 0.9rem; text-transform: uppercase; color: var(--text); letter-spacing: 0.5px; transition: color 0.3s; padding: 10px 0; }
    .nav-link:hover { color: var(--primary); }
    .nav-link.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
    .nav-link::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 3px; background: var(--primary); transition: width 0.3s; }
    .nav-item:hover .nav-link::after { width: 100%; }

    .mega-menu { position: absolute; top: 100%; left: -50px; background: #fff; width: 600px; box-shadow: var(--shadow-md); opacity: 0; visibility: hidden; transition: 0.2s; border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; display: flex; padding: 30px; gap: 40px; }
    .nav-item:hover .mega-menu { opacity: 1; visibility: visible; }
    .mega-col h4 { font-family: var(--font-brand); font-size: 0.9rem; color: var(--primary); margin-bottom: 15px; text-transform: uppercase; }
    .mega-col li { margin-bottom: 10px; }
    .mega-col a { color: var(--text); font-size: 0.9rem; transition: 0.2s; }
    .mega-col a:hover { color: var(--primary); font-weight: 500; }

    .header-actions { display: flex; align-items: center; gap: 25px; }
    .action-icon { font-size: 1.25rem; color: var(--secondary); position: relative; transition: 0.3s; border:none; background:transparent;}
    .action-icon:hover { color: var(--primary); transform: scale(1.1); }
    .badge { position: absolute; top: -8px; right: -8px; background: var(--primary); color: #fff; font-size: 0.65rem; font-weight: 700; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #fff; }

    /* Layout Containers */
    .hero { position: relative; height: 600px; background: var(--secondary); overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .hero-bg { position: absolute; inset: 0; background: url('https://images.unsplash.com/photo-1445205170230-053b83016050?q=80&w=2071') center/cover; opacity: 0.4; }
    .hero-content { position: relative; z-index: 2; text-align: center; max-width: 800px; padding: 0 20px; }
    .hero-h1 { font-family: var(--font-brand); font-size: 4rem; font-weight: 800; color: #fff; margin-bottom: 15px; line-height: 1.1; letter-spacing: -1px; }
    .hero-p { font-size: 1.2rem; color: rgba(255,255,255,0.8); margin-bottom: 30px; }

    .page-container { padding: 60px 40px; max-width: 1600px; margin: 0 auto; min-height: 70vh; }
    .sec-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
    .sec-title { font-family: var(--font-brand); font-size: 2rem; font-weight: 700; color: var(--secondary); text-transform: uppercase; letter-spacing: 1px; }
    
    .scroll-container { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
    .scroll-container::-webkit-scrollbar { display: none; }
    .scroll-item { min-width: 280px; flex: 0 0 auto; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

    /* Category Page Sidebar Layout */
    .category-layout { display: flex; gap: 40px; }
    .sidebar { width: 250px; flex-shrink: 0; }
    .sidebar-block { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
    .sidebar-title { font-weight: 700; text-transform: uppercase; margin-bottom: 15px; font-size: 0.9rem; }
    .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-light); cursor: pointer; }
    
    /* Product Detail Component */
    .pdp-layout { display: flex; gap: 50px; background: #fff; }
    .pdp-images { flex: 1; display: flex; gap: 20px; }
    .pdp-thumbnails { display: flex; flex-direction: column; gap: 10px; width: 80px; }
    .pdp-thumb { width: 100%; aspect-ratio: 3/4; object-fit: cover; border: 2px solid transparent; cursor: pointer; border-radius: var(--radius); }
    .pdp-thumb.active { border-color: var(--secondary); }
    .pdp-main-img { flex: 1; aspect-ratio: 3/4; object-fit: cover; border-radius: var(--radius); background: var(--bg-alt); }
    
    .pdp-info { flex: 1; padding: 20px 0; }
    .pdp-brand { font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; margin-bottom: 8px; }
    .pdp-title { font-family: var(--font-brand); font-size: 2.5rem; font-weight: 600; color: var(--secondary); line-height: 1.2; margin-bottom: 15px; }
    .pdp-price-wrap { display: flex; align-items: baseline; gap: 12px; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 25px; }
    
    .size-btn { width: 50px; height: 50px; border: 1px solid var(--border); border-radius: 50%; font-weight: 600; color: var(--text); background: #fff; transition: 0.2s; }
    .size-btn:hover { border-color: var(--secondary); }
    .size-btn.active { background: var(--secondary); color: #fff; border-color: var(--secondary); }
    
    .pdp-tabs { display: flex; gap: 30px; border-bottom: 1px solid var(--border); margin: 40px 0 20px; }
    .pdp-tab { padding: 10px 0; font-weight: 600; color: var(--text-light); position: relative; }
    .pdp-tab.active { color: var(--secondary); }
    .pdp-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--secondary); }

    /* Product Cards */
    .product-card { background: #fff; border-radius: var(--radius); position: relative; transition: var(--transition); cursor: pointer; }
    .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-sm); }
    
    .card-img-wrap { position: relative; aspect-ratio: 3/4; overflow: hidden; border-radius: var(--radius); background: #f0f0f0; }
    .card-img-main, .card-img-hover { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s, transform 0.5s; }
    .card-img-hover { position: absolute; top:0; left:0; opacity: 0; }
    .product-card:hover .card-img-main { opacity: 0; }
    .product-card:hover .card-img-hover { opacity: 1; transform: scale(1.05); }

    .card-badges { position: absolute; top: 12px; left: 12px; z-index: 2; display: flex; flex-direction: column; gap: 5px; }
    .tag { background: #fff; color: var(--secondary); font-size: 0.7rem; font-weight: 700; padding: 4px 8px; border-radius: 2px; text-transform: uppercase; box-shadow: var(--shadow-sm); }
    .tag-primary { background: var(--primary); color: #fff; }

    .floating-actions { position: absolute; top: 12px; right: 12px; z-index: 2; display: flex; flex-direction: column; gap: 8px; transform: translateX(20px); opacity: 0; transition: var(--transition); }
    .product-card:hover .floating-actions { transform: translateX(0); opacity: 1; }
    .icon-btn { width: 36px; height: 36px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); color: var(--text-light); transition: 0.2s; }
    .icon-btn:hover { background: var(--secondary); color: #fff; }
    .icon-btn.active { color: var(--primary); }

    .card-details { padding: 16px 5px; }
    .card-brand { font-size: 0.75rem; color: var(--text-light); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .card-name { font-size: 1rem; color: var(--text); font-weight: 500; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-price-row { display: flex; align-items: center; gap: 8px; }
    .price-new { font-weight: 700; font-size: 1.1rem; color: var(--secondary); }
    .price-old { font-size: 0.85rem; color: var(--text-light); text-decoration: line-through; }
    .price-off { font-size: 0.8rem; color: var(--primary); font-weight: 600; }

    .hover-actions { position: absolute; bottom: 0; left: 0; right: 0; display: flex; transform: translateY(100%); opacity: 0; transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s; z-index: 5; background: rgba(255,255,255,0.95); padding: 10px; gap: 10px; backdrop-filter: blur(4px); box-shadow: 0 -4px 10px rgba(0,0,0,0.05); }
    .product-card:hover .hover-actions { transform: translateY(0); opacity: 1; }
    .hover-btn { flex: 1; padding: 10px 0; border: none; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; transition: 0.2s; border-radius: 4px; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .btn-cart { background: var(--secondary); color: #fff; }
    .btn-cart:hover { background: #000; transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .btn-buy { background: var(--primary); color: #fff; }
    .btn-buy:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    
    /* Toast Notifications */
    .toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast { background: var(--secondary); color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: 500; font-size: 0.9rem; box-shadow: var(--shadow-md); animation: toastIn 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards, toastOut 0.3s ease-in forwards 3s; display: flex; align-items: center; gap: 10px; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes toastOut { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(-10px) scale(0.95); } }

    .footer { background: var(--bg-alt); padding: 80px 40px 40px; border-top: 1px solid var(--border); margin-top: 60px; }
    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; gap: 50px; max-width: 1600px; margin: 0 auto; }
    .foot-col h4 { font-family: var(--font-brand); font-size: 1rem; color: var(--secondary); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
    .foot-col p { color: var(--text-light); font-size: 0.95rem; line-height: 1.6; margin-bottom: 20px; }
    .foot-list { display: flex; flex-direction: column; gap: 12px; }
    .foot-list a { color: var(--text-light); font-size: 0.95rem; transition: 0.2s; }
    .foot-list a:hover { color: var(--primary); padding-left: 5px; }
    .foot-social { display: flex; gap: 15px; }
    .foot-social a { width: 40px; height: 40px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; color: var(--secondary); transition: 0.3s; box-shadow: var(--shadow-sm); }
    .foot-social a:hover { background: var(--primary); color: #fff; transform: translateY(-3px); }

    /* Standard Modals & Drawer Overlays */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 2000; opacity: 0; visibility: hidden; transition: 0.3s; }
    .overlay.active { opacity: 1; visibility: visible; }
    .modal-center { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.95); background: #fff; z-index: 2001; border-radius: 8px; box-shadow: var(--shadow-lg); opacity: 0; visibility: hidden; transition: 0.3s; overflow: hidden; }
    .modal-center.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
    .modal-close { position: absolute; top: 15px; right: 15px; font-size: 1.5rem; color: var(--text-light); z-index: 10; transition: 0.2s; cursor:pointer;}
    .modal-close:hover { color: var(--primary); }
    .login-modal { width: 400px; padding: 40px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--secondary); }
    .form-input { width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 1rem; outline: none; transition: 0.2s; font-family: var(--font-body); }
    
    .drawer { position: fixed; top: 0; right: -450px; width: 420px; height: 100vh; background: #fff; z-index: 2001; box-shadow: -5px 0 25px rgba(0,0,0,0.1); transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); display: flex; flex-direction: column; }
    .drawer.open { right: 0; }
    .drawer-header { padding: 25px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    
    .admin-modal { width: 90vw; height: 85vh; display: flex; flex-direction: column; }
    .admin-modal-head { padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; }
    .admin-modal-body { display: flex; flex: 1; overflow: hidden; }

    /* About/Contact Simple layouts */
    .info-layout { max-width: 800px; margin: 0 auto; text-align: center; }
    .info-layout p { font-size: 1.1rem; color: var(--text-light); line-height: 1.8; margin-bottom: 20px;}
  
    /* NEW PREMIUM ANIMATIONS */
    @keyframes kenburns {
      0% { transform: scale(1); }
      100% { transform: scale(1.15); }
    }
    
    .parallax-bg {
      background-attachment: fixed;
      background-position: center;
      background-size: cover;
    }
    
    .reveal-up {
      opacity: 0; transform: translateY(40px);
      transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .reveal-up.revealed { opacity: 1; transform: translateY(0); }
    
    .reveal-fade { opacity: 0; transition: opacity 1s ease-in-out; }
    .reveal-fade.revealed { opacity: 1; }

    /* Staggered Grid Content */
    @keyframes staggeredFadeUp {
       to { opacity: 1; transform: translateY(0); }
    }
    .grid > * {
       opacity: 0;
       transform: translateY(30px);
       animation: staggeredFadeUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    .grid > *:nth-child(1) { animation-delay: 0.05s; }
    .grid > *:nth-child(2) { animation-delay: 0.1s; }
    .grid > *:nth-child(3) { animation-delay: 0.15s; }
    .grid > *:nth-child(4) { animation-delay: 0.2s; }
    .grid > *:nth-child(5) { animation-delay: 0.25s; }
    .grid > *:nth-child(6) { animation-delay: 0.3s; }
    .grid > *:nth-child(n+7) { animation-delay: 0.35s; }

    /* Category Cards */
    .flex-gap-30 { display: flex; gap: 30px; }
    @media (max-width: 768px) {
      .flex-gap-30 { flex-direction: column; }
    }
    .cat-card { flex: 1; height: 500px; position: relative; overflow: hidden; border-radius: var(--radius); cursor: pointer; background: #111; }
    .cat-card-img { position: absolute; inset: 0; background-position: center; background-size: cover; transition: transform 0.6s, filter 0.6s; }
    .cat-card:hover .cat-card-img { transform: scale(1.08); filter: brightness(0.7); }
    .cat-card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; color: #fff; }
    .cat-card-overlay h3 { font-family: var(--font-brand); font-size: 2.5rem; margin-bottom: 10px; }
    .explore-cta { font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); opacity: 0; transform: translateY(10px); transition: 0.3s; }
    .cat-card:hover .explore-cta { opacity: 1; transform: translateY(0); }

    /* Marquee */
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .marquee-content { animation: marquee 25s linear infinite; display: inline-block; }

    /* Trending Collections */
    .trending-collection-card { position: relative; width: 320px; height: 450px; border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; }
    .trending-collection-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
    .trending-collection-card:hover { transform: translateY(-10px); box-shadow: var(--shadow-lg); }
    .trending-collection-card:hover img { transform: scale(1.05); }
    .tc-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px 20px 20px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); color: #fff; font-family: var(--font-brand); font-size: 1.5rem; font-weight: 700; text-align: center; }

    /* Customer Gallery */
    @keyframes scrollGallery { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    @keyframes scrollGalleryReverse { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }

    /* Responsive adjustments */
    @media (max-width: 768px) {
       .header-inner { padding: 0 20px; }
       .nav-links { display: none; }
       .hero-h1 { font-size: 3rem; }
       .admin-modal { width: 95vw; }
       .admin-modal-body { flex-direction: column; }
       .admin-modal-body > div { width: 100% !important; border-bottom: 1px solid var(--border); }
    }

  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    // ---------------------------------------------------------
    // DEPLOYMENT CONFIGURATION
    // When you deploy your backend to Render, paste the Render URL here:

    const isLocalMode = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const API_URL = (isLocalMode && window.location.port !== '5000') ? 'http://localhost:5000' : PROD_BACKEND_URL;

    const TopBar = () => (
      <div style={{background: 'var(--secondary)', color: '#fff', fontSize: '0.8rem', padding: '8px 40px', display: 'flex', justifyContent: 'space-between', flexWrap:'wrap', gap:10}}>
         <div style={{display:'flex', gap: 15}}>
            <a href="#"><i className="fab fa-facebook-f"></i></a>
            <a href="#"><i className="fab fa-instagram"></i></a>

    const MarqueeStrip = () => (
      <div style={{background: 'var(--primary)', color:'#fff', padding: '12px 0', overflow:'hidden', whiteSpace:'nowrap', display:'flex', fontWeight:600, letterSpacing:'2px', fontSize:'0.85rem'}}>
         <div className="marquee-content">
            <span>👗 FREE SHIPPING ON ORDERS OVER ₹1000 &nbsp; • &nbsp; 🌟 NEW ARRIVALS DROP EVERY FRIDAY &nbsp; • &nbsp; 💸 15% OFF YOUR FIRST ORDER WITH CODE: AURA15 &nbsp; • &nbsp; 👗 FREE SHIPPING ON ORDERS OVER ₹1000 &nbsp; • &nbsp; 🌟 NEW ARRIVALS DROP EVERY FRIDAY &nbsp; • &nbsp; 💸 15% OFF YOUR FIRST ORDER WITH CODE: AURA15</span>
         </div>
      </div>
    );

    function App() {
      // Data State
      const [products, setProducts] = useState([]);
      const [trending, setTrending] = useState([]);
      const [newArrivals, setNewArrivals] = useState([]);
      
      // Auth State
      const [user, setUser] = useState(null);
      const [token, setToken] = useState(localStorage.getItem('token') || null);
      
      // Routing / Views State
      const [activeCategory, setActiveCategory] = useState('home'); 
      const [activeProduct, setActiveProduct] = useState(null); 
      
      // Modals State
      const [showLogin, setShowLogin] = useState(false);
      const [showCart, setShowCart] = useState(false);
      const [showAdmin, setShowAdmin] = useState(false);
      
      const [systemSettings, setSystemSettings] = useState({});
      const [quickViewProduct, setQuickViewProduct] = useState(null);
      const [adminTab, setAdminTab] = useState('dashboard');
      const [settingsForm, setSettingsForm] = useState({
         hero1: '', hero2: '', hero3: '',
         menCat: '', womenCat: '', kidsCat: '',
         custPhoto1: '', custPhoto2: '', custPhoto3: '', custPhoto4: ''
      });
      
      const [showSearch, setShowSearch] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [toastMsg, setToastMsg] = useState('');
      const [toastKey, setToastKey] = useState(0);

      const showToast = (msg) => {
         setToastMsg(msg);
         setToastKey(prev => prev + 1);
      };

      // User Lists
      const [cart, setCart] = useState([]);
      const [wishlist, setWishlist] = useState([]);

      // Heart / Cart animation triggers
      const [cartAnim, setCartAnim] = useState(false);

      // Forms
      const [loginForm, setLoginForm] = useState({ email: '', password: '' });
      const [loginError, setLoginError] = useState('');
      const defaultAdminForm = { _id: null, name: '', brand: '', category: 'men', price: '', originalPrice: '', images: '', tags: '' };
      const [adminForm, setAdminForm] = useState(defaultAdminForm);
      const [adminStats, setAdminStats] = useState(null);
      const [adminOrders, setAdminOrders] = useState([]);

      // PDP State
      const [imgIdx, setImgIdx] = useState(0);
      const [size, setSize] = useState('M');
      const [tab, setTab] = useState('desc');

      // Filters for Category Views
      const [sortOption, setSortOption] = useState('newest');

      useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('revealed');
            });
        }, { threshold: 0.1 });
        const targets = document.querySelectorAll('.reveal-up:not(.revealed), .reveal-fade:not(.revealed)');
        targets.forEach(el => observer.observe(el));
        return () => observer.disconnect();
      });

      const fetchProducts = async () => {
         try {
           const res = await fetch(`${API_URL}/api/products`);
           const data = await res.json();
           let actualProducts = data.products || data;
           if(Array.isArray(actualProducts)){
              actualProducts = actualProducts.map(p => ({
                 ...p,
                 images: p.images ? p.images.map(img => img.startsWith('/') && API_URL ? API_URL + img : img) : []
              }));
           }
           setProducts(actualProducts);
           // Set trending & new arrivals from data
           if(Array.isArray(actualProducts)) {
               setTrending(actualProducts.filter(p => typeof p.tags === 'string' ? p.tags.toLowerCase().includes('trending') : p.tags?.includes('trending')).slice(0, 8));
               setNewArrivals(actualProducts.filter(p => typeof p.tags === 'string' ? p.tags.toLowerCase().includes('new') : p.tags?.includes('new')).slice(0, 8));
           }
         } catch(e) { console.error("Error fetching products:", e); }
      };

      // useScrollReveal hook equiv
      useEffect(() => {
        if (token) {
          fetch(`${API_URL}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } })
          .then(res => res.json())
          .then(data => {
            if(!data.error) {
              setUser(data);
              setWishlist(data.wishlist?.map(w => w._id || w) || []);
            } else {
              localStorage.removeItem('token');
              setToken(null);
            }
          }).catch(console.error);
        }
        fetchProducts();
        fetch(`${API_URL}/api/settings`).then(res=>res.json()).then(data => {
           const mappedData = {};
           for(let k in data) mappedData[k] = (typeof data[k] === 'string' && data[k].startsWith('/') && API_URL) ? API_URL + data[k] : data[k];
           setSystemSettings(mappedData);
           setSettingsForm(prev => ({...prev, ...data}));
        }).catch(console.error);
      }, [token]);

      useEffect(() => {
        if (user && user.role === 'admin') {
           const token = localStorage.getItem('token');
           const headers = { 'Authorization': `Bearer ${token}` };
           Promise.all([
               fetch(`${API_URL}/api/admin/stats`, { headers }).then(res=>res.json()),
               fetch(`${API_URL}/api/orders`, { headers }).then(res=>res.json())
           ]).then(([statsData, ordersData]) => {
               if(!statsData.error) setAdminStats(statsData);
               if(!ordersData.error) setAdminOrders(ordersData);
           }).catch(console.error);
        }
      }, [user]);

      // --- Actions ---
      const handleLoginSubmit = async (e) => {
        e.preventDefault();
        setLoginError('');
        try {
          const res = await fetch(`${API_URL}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(loginForm)
          });
          const data = await res.json();
          if(data.error) throw new Error(data.error);
          
          localStorage.setItem('token', data.token);
          setToken(data.token);
          setShowLogin(false);
          setLoginForm({ email: '', password: '' });
        } catch (err) { setLoginError(err.message); }
      };

      const handleLogout = () => {
        localStorage.removeItem('token');
        setToken(null);
        setUser(null);
        setWishlist([]);
      };

      const toggleWishlist = async (prodId, e) => {
        if(e) e.stopPropagation();
        setWishlist(prev => prev.includes(prodId) ? prev.filter(id => id !== prodId) : [...prev, prodId]);
        if (user) {
          try {
             await fetch(`${API_URL}/api/users/wishlist/${prodId}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
          } catch (err) { console.error(err); }
        }
      };

      const addToBag = (prod, e) => {
        if(e) e.stopPropagation();
        setCart(prev => {
          const exists = prev.find(p => p._id === prod._id);
          if (exists) return prev.map(p => p._id === prod._id ? {...p, qty: p.qty + 1} : p);
          return [...prev, {...prod, qty: 1}];
        });
        setCartAnim(true);
        setTimeout(() => setCartAnim(false), 300);
        setShowCart(true);
      };

      const handleNav = (page, e) => {
        if(e) e.preventDefault();
        setActiveProduct(null);
        setActiveCategory(page);
        window.scrollTo({top: 0, behavior: 'smooth'});
        setShowSearch(false);
      };

      const ProductCard = ({ prod }) => {
        const isWished = wishlist.includes(prod._id);
        const img1 = prod.images?.[0] || 'https://via.placeholder.com/400x500';
        const img2 = prod.images?.[1] || img1;
        const discount = prod.discount > 0 ? prod.discount : (prod.originalPrice > prod.price ? Math.round(((prod.originalPrice - prod.price)/prod.originalPrice)*100) : 0);

        return (
          <div className="product-card">
            <div className="card-img-wrap">
              <img src={img1} className="card-img-main" onClick={() => { window.scrollTo({top:0}); setActiveProduct(prod); }} alt={prod.name} />
              <img src={img2} className="card-img-hover" onClick={() => { window.scrollTo({top:0}); setActiveProduct(prod); }} alt={prod.name} />
              
              <div className="card-badges">
                {prod.tags?.includes('new') && <span className="tag">New</span>}
                {discount > 0 && <span className="tag tag-primary">-{discount}%</span>}
              </div>

              <div className="floating-actions">
                <button className={`icon-btn ${isWished ? 'heart-pulse' : ''}`} onClick={(e) => toggleWishlist(prod._id, e)}>
                  <i className={isWished ? "fas fa-heart" : "far fa-heart"}></i>
                </button>
                <button className="icon-btn" onClick={(e) => { e.stopPropagation(); setQuickViewProduct(prod); }} title="Quick View">
                   <i className="far fa-eye"></i>
                </button>
              </div>

              <div className="hover-actions">
                <button className="hover-btn btn-cart" onClick={(e) => addToBag(prod, e)}><i className="fas fa-shopping-cart"></i> Add</button>
                <button className="hover-btn btn-buy" onClick={(e) => { addToBag(prod, e); handleNav('cart', e); }}><i className="fas fa-bolt"></i> Buy Now</button>
              </div>
            </div>
            
            <div className="card-details">
              <div className="card-brand" onClick={() => { window.scrollTo({top:0}); setActiveProduct(prod); }}>{prod.brand || 'Aura Originals'}</div>
              <div className="card-name">{prod.name}</div>
              <div className="card-price-row">
                <span className="price-new">₹{prod.price}</span>
                {prod.originalPrice > prod.price && <span className="price-old">₹{prod.originalPrice}</span>}
                {discount > 0 && <span className="price-off">({discount}% OFF)</span>}
              </div>
            </div>
          </div>
        );
      };

      // --- Internal Sub-Views ---
      
      const renderProductDetail = () => {
         const prod = activeProduct;
         
         if(!prod) return null;
         const discount = prod.discount > 0 ? prod.discount : (prod.originalPrice > prod.price ? Math.round(((prod.originalPrice - prod.price)/prod.originalPrice)*100) : 0);
         const simItems = products.filter(p => p.category === prod.category && p._id !== prod._id).slice(0, 4);

         return (
           <div className="page-container" style={{paddingTop: 30}}>

                    <h1 className="pdp-title">{prod.name}</h1>

                      <span style={{fontSize:'2rem', fontWeight:700, color:'var(--secondary)'}}>₹{prod.price}</span>
                      {prod.originalPrice > prod.price && <span style={{fontSize:'1.2rem', color:'var(--text-light)', textDecoration:'line-through'}}>₹{prod.originalPrice}</span>}
                      {discount > 0 && <span style={{fontSize:'1rem', color:'var(--primary)', fontWeight:700}}>({discount}% OFF)</span>}
                    </div>

         if(!file) return;
         const fd = new FormData(); fd.append('images', file);
         try {
             const res = await fetch(`${API_URL}/api/upload`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: fd });
             const data = await res.json();
             if(data.urls) setSettingsForm({...settingsForm, [key]: data.urls[0]});
         } catch(err) { showToast(err.message); }
      };

        e.preventDefault();
        const isEdit = !!adminForm._id;
        const url = isEdit ? `${API_URL}/api/products/${adminForm._id}` : `${API_URL}/api/products`;
        
        let p = Number(adminForm.price);
        let op = Number(adminForm.originalPrice);
        const discount = op > p ? Math.round(((op - p) / op) * 100) : 0;

        const formData = new FormData();
        formData.append('name', adminForm.name);
        formData.append('brand', adminForm.brand);
        formData.append('category', adminForm.category);
        formData.append('price', p);
        formData.append('originalPrice', op);
        formData.append('discount', discount);
        if(adminForm.tags) formData.append('tags', adminForm.tags);
        if(adminForm.images) formData.append('images', adminForm.images);

        const fileInput = document.getElementById('admin-file-upload');
        if(fileInput && fileInput.files.length > 0) {
           for(let i=0; i<fileInput.files.length; i++){
               formData.append('images', fileInput.files[i]);
           }
        }

        try {
          const res = await fetch(url, {
            method: isEdit ? 'PUT' : 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
          });
          const updatedProduct = await res.json();
          if(updatedProduct.error) throw new Error(updatedProduct.error);

          fetchProducts();
          setAdminForm(defaultAdminForm);
          if(fileInput) fileInput.value = '';
          showToast(`Product ${isEdit ? 'updated' : 'created'} successfully!`);
          // Automatically switch view to products so user can see it!
          if(!isEdit) setAdminTab('products');

        }

              <div className="toast" key={toastKey}>
                <i className="fas fa-check-circle" style={{color: '#4caf50'}}></i> {toastMsg}
              </div>
            )}
          </div>

          <div className={`modal-center admin-modal ${showAdmin ? 'active' : ''}`}>
             <div className="admin-modal-head">
                <h2 style={{fontFamily:'var(--font-brand)', fontSize:'1.5rem'}}>Store Administrator Dashboard</h2>
                <button className="action-icon" style={{border:'none', fontSize:'1.5rem'}} onClick={() => setShowAdmin(false)}><i className="fas fa-times"></i></button>
             </div>
             <div className="admin-modal-body" style={{flexDirection:'column'}}>
                 <div style={{display:'flex', width:'100%', background:'#eee', borderBottom:'1px solid var(--border)'}}>
                    <button style={{padding:'15px 30px', fontWeight:600, background: adminTab === 'dashboard' ? '#fff' : 'transparent', color: adminTab === 'dashboard' ? 'var(--primary)' : 'var(--secondary)'}} onClick={() => setAdminTab('dashboard')}>Overview</button>
                    <button style={{padding:'15px 30px', fontWeight:600, background: adminTab === 'orders' ? '#fff' : 'transparent', color: adminTab === 'orders' ? 'var(--primary)' : 'var(--secondary)'}} onClick={() => setAdminTab('orders')}>Orders</button>
                    <button style={{padding:'15px 30px', fontWeight:600, background: adminTab === 'products' ? '#fff' : 'transparent', color: adminTab === 'products' ? 'var(--primary)' : 'var(--secondary)'}} onClick={() => setAdminTab('products')}>Products</button>
                    <button style={{padding:'15px 30px', fontWeight:600, background: adminTab === 'settings' ? '#fff' : 'transparent', color: adminTab === 'settings' ? 'var(--primary)' : 'var(--secondary)'}} onClick={() => setAdminTab('settings')}>Settings</button>
                 </div>

                 {adminTab === 'dashboard' && (
                    <div style={{padding: '40px', overflowY:'auto', background:'#f9f9f9', flex:1}}>
                       <h3 style={{marginBottom: 30, fontSize:'1.5rem', borderBottom:'1px solid var(--border)', paddingBottom:15}}>Admin Dashboard Overview</h3>
                       {adminStats ? (
                          <div style={{display:'flex', gap:30, flexWrap:'wrap'}}>
                             <div style={{background:'#fff', padding:30, borderRadius:'var(--radius)', flex:1, border:'1px solid var(--border)', textAlign:'center'}}>
                                <i className="fas fa-box" style={{fontSize:'2.5rem', color:'var(--primary)', marginBottom:15}}></i>
                                <h2 style={{fontSize:'2.5rem', marginBottom: 5}}>{adminStats.totalProducts}</h2>
                                <p style={{color:'var(--text-light)', fontWeight:600}}>Total Products</p>
                             </div>
                             <div style={{background:'#fff', padding:30, borderRadius:'var(--radius)', flex:1, border:'1px solid var(--border)', textAlign:'center'}}>
                                <i className="fas fa-shopping-cart" style={{fontSize:'2.5rem', color:'var(--primary)', marginBottom:15}}></i>
                                <h2 style={{fontSize:'2.5rem', marginBottom: 5}}>{adminStats.totalOrders}</h2>
                                <p style={{color:'var(--text-light)', fontWeight:600}}>Total Orders</p>
                             </div>
                             <div style={{background:'#fff', padding:30, borderRadius:'var(--radius)', flex:1, border:'1px solid var(--border)', textAlign:'center'}}>
                                <i className="fas fa-users" style={{fontSize:'2.5rem', color:'var(--primary)', marginBottom:15}}></i>
                                <h2 style={{fontSize:'2.5rem', marginBottom: 5}}>{adminStats.totalUsers}</h2>
                                <p style={{color:'var(--text-light)', fontWeight:600}}>Registered Users</p>
                             </div>
                             <div style={{background:'#fff', padding:30, borderRadius:'var(--radius)', flex:1, border:'1px solid var(--border)', textAlign:'center'}}>
                                <i className="fas fa-rupee-sign" style={{fontSize:'2.5rem', color:'var(--primary)', marginBottom:15}}></i>
                                <h2 style={{fontSize:'2.5rem', marginBottom: 5}}>₹{adminStats.revenue}</h2>
                                <p style={{color:'var(--text-light)', fontWeight:600}}>Total Revenue</p>
                             </div>
                          </div>
                       ) : <p>Loading stats...</p>}
                    </div>
                 )}

                 {adminTab === 'orders' && (
                    <div style={{padding: '40px', overflowY:'auto', background:'#fff', flex:1}}>
                       <h3 style={{marginBottom: 30, fontSize:'1.5rem', borderBottom:'1px solid var(--border)', paddingBottom:15}}>Orders Management</h3>
                       <div style={{display:'grid', gap: 15}}>
                          {adminOrders.length > 0 ? adminOrders.map(o => (
                             <div key={o._id} style={{padding:20, border:'1px solid var(--border)', borderRadius:'var(--radius)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                <div>
                                   <div style={{fontWeight:700, fontSize:'1.1rem'}}>Order #{o._id.substring(o._id.length-6).toUpperCase()}</div>
                                   <div style={{fontSize:'0.9rem', color:'var(--text-light)', marginTop:5}}>{new Date(o.createdAt).toLocaleString()} • {o.items.length} items</div>
                                </div>
                                <div style={{fontWeight:700, fontSize:'1.3rem'}}>₹{o.total}</div>
                                <div>
                                   <span style={{padding:'8px 12px', background: o.orderStatus === 'delivered' ? '#e6f4ea' : 'var(--bg-alt)', color: o.orderStatus === 'delivered' ? '#1e8e3e' : '#333', borderRadius:4, fontSize:'0.85rem', fontWeight:600, textTransform:'uppercase'}}>{o.orderStatus}</span>
                                </div>
                             </div>
                          )) : <div style={{padding:40, textAlign:'center', color:'var(--text-light)'}}><i className="fas fa-inbox" style={{fontSize:'3rem', marginBottom:20, opacity:0.3}}></i><p>No orders found.</p></div>}
                       </div>
                    </div>
                 )}

                 {adminTab === 'products' && (
                 <div style={{display:'flex', flex:1, overflow:'hidden'}}>
                    <div style={{width: '40%', padding: '30px', borderRight: '1px solid var(--border)', overflowY: 'auto', background:'#fff'}}>
                       <h3 style={{marginBottom: 20}}>{adminForm._id ? 'Edit Product' : 'Add New Product'}</h3>
                       <form onSubmit={handleAdminSubmit}>
                         <div className="form-group"><label className="form-label">Name</label><input className="form-input" value={adminForm.name} onChange={e => setAdminForm({...adminForm, name: e.target.value})} required/></div>
                         <div className="form-group"><label className="form-label">Brand</label><input className="form-input" value={adminForm.brand} onChange={e => setAdminForm({...adminForm, brand: e.target.value})} required/></div>
                         <div className="form-group"><label className="form-label">Category</label>
                            <select className="form-input" value={adminForm.category} onChange={e => setAdminForm({...adminForm, category: e.target.value})}>
                              <option value="men">Men's Wear</option><option value="women">Women's Wear</option><option value="kids">Kids Wear</option>
                            </select>
                         </div>
                         <div style={{display:'flex', gap:10}}>
                           <div className="form-group" style={{flex:1}}><label className="form-label">Selling Price (₹)</label><input type="number" className="form-input" value={adminForm.price} onChange={e => setAdminForm({...adminForm, price: e.target.value})} required/></div>
                           <div className="form-group" style={{flex:1}}><label className="form-label">Original Price (₹)</label><input type="number" className="form-input" value={adminForm.originalPrice} onChange={e => setAdminForm({...adminForm, originalPrice: e.target.value})} required/></div>
                         </div>
                         
                         <div className="form-group">
                           <label className="form-label">Product Images (URLs or File Upload)</label>
                           <input type="text" className="form-input" style={{marginBottom: 8}} placeholder="Image URL (comma separated if multiple)" value={adminForm.images} onChange={e => setAdminForm({...adminForm, images: e.target.value})}/>
                           <div style={{fontSize:'0.85rem', fontWeight:600, margin:'5px 0'}}>OR</div>
                           <input type="file" id="admin-file-upload" className="form-input" multiple accept="image/*" />
                         </div>

                         <div className="form-group">
                           <label className="form-label">Product Flags (Tags)</label>
                           <div style={{display:'flex', gap: 15, flexWrap:'wrap'}}>
                              <label style={{fontSize:'0.85rem'}}><input type="checkbox" checked={adminForm.tags?.includes('trending')} onChange={e => {
                                  const tg = adminForm.tags ? adminForm.tags.split(',').map(s=>s.trim()).filter(Boolean) : [];
                                  if(e.target.checked) tg.push('trending'); else { const idx = tg.indexOf('trending'); if(idx>-1) tg.splice(idx, 1); }
                                  setAdminForm({...adminForm, tags: tg.join(',')});
                              }} /> Trending Now</label>
                              <label style={{fontSize:'0.85rem'}}><input type="checkbox" checked={adminForm.tags?.includes('new')} onChange={e => {
                                  const tg = adminForm.tags ? adminForm.tags.split(',').map(s=>s.trim()).filter(Boolean) : [];
                                  if(e.target.checked) tg.push('new'); else { const idx = tg.indexOf('new'); if(idx>-1) tg.splice(idx, 1); }
                                  setAdminForm({...adminForm, tags: tg.join(',')});
                              }} /> New Arrival</label>
                              <label style={{fontSize:'0.85rem'}}><input type="checkbox" checked={adminForm.tags?.includes('bestseller')} onChange={e => {
                                  const tg = adminForm.tags ? adminForm.tags.split(',').map(s=>s.trim()).filter(Boolean) : [];
                                  if(e.target.checked) tg.push('bestseller'); else { const idx = tg.indexOf('bestseller'); if(idx>-1) tg.splice(idx, 1); }
                                  setAdminForm({...adminForm, tags: tg.join(',')});
                              }} /> Bestseller</label>
                           </div>
                         </div>
                         
                         <button type="submit" className="btn btn-solid" style={{width: '100%', padding: '15px'}}>{adminForm._id ? 'Update Product' : 'Create Product'}</button>
                         {adminForm._id && <button type="button" className="btn btn-outline" style={{width: '100%', padding: '15px', marginTop: 10}} onClick={() => setAdminForm({ _id: null, name: '', brand: '', category: 'men', price: '', originalPrice: '', images: '', tags: '' })}>Cancel Edit</button>}
                       </form>
                    </div>
                    <div style={{width: '60%', padding: '30px', overflowY: 'auto', background:'var(--bg-alt)'}}>
                       <h3 style={{marginBottom: 20}}>Product Inventory ({products.length})</h3>
                       <div style={{display: 'grid', gridTemplateColumns: '1fr', gap: '15px'}}>
                         {products.map(p => (
                            <div key={p._id} style={{display:'flex', alignItems:'center', background:'#fff', padding:'15px', borderRadius:'var(--radius)', border:'1px solid var(--border)'}}>
                               <img src={p.images?.[0]} style={{width: 60, height: 60, objectFit:'cover', borderRadius: 4, marginRight: 15}}/>
                               <div style={{flex: 1}}>
                                  <div style={{fontWeight:600}}>{p.name}</div>
                                  <div style={{fontSize: '0.85rem', color: 'var(--text-light)', marginTop:4}}>{p.brand} • {p.category} • ₹{p.price}</div>
                                  <div style={{fontSize: '0.75rem', color: 'var(--primary)', marginTop:4, textTransform:'uppercase'}}>{Array.isArray(p.tags) ? p.tags.join(', ') : p.tags}</div>
                               </div>
                               <button className="icon-btn" style={{marginRight: 10}} onClick={() => { setAdminTab('products'); setAdminForm({_id: p._id, name: p.name||'', brand: p.brand||'', category: p.category||'men', price: p.price||'', originalPrice: p.originalPrice||'', images: Array.isArray(p.images) ? p.images.join(', ') : p.images || '', tags: Array.isArray(p.tags) ? p.tags.join(', ') : p.tags || ''}); }} title="Edit"><i className="fas fa-pen"></i></button>
                               <button className="icon-btn" onClick={() => deleteProduct(p._id)} title="Delete"><i className="fas fa-trash" style={{color: 'var(--primary)'}}></i></button>
                            </div>
                         ))}
                       </div>
                    </div>
                 </div>)}

                 {adminTab === 'settings' && (
                    <div style={{padding: '40px', overflowY:'auto', background:'#fff', flex:1}}>
                       <h3 style={{marginBottom: 30, fontSize:'1.5rem', borderBottom:'1px solid var(--border)', paddingBottom:15}}>Homepage Layout Configuration</h3>
                       <form onSubmit={handleSettingsSubmit} style={{maxWidth: 800}}>
                          
                          <h4 style={{marginTop: 30, marginBottom: 15, color:'var(--primary)'}}>Hero Slider Images (1920x1080)</h4>
                          {['hero1', 'hero2', 'hero3'].map((key, i) => (
                             <div className="form-group" style={{display:'flex', gap: 15, alignItems:'center'}} key={key}>
                                <div style={{width: 100}}>Slide ${i+1}</div>
                                <input className="form-input" style={{flex:1}} value={settingsForm[key]} onChange={e => setSettingsForm({...settingsForm, [key]: e.target.value})} placeholder="Image URL"/>
                                <input type="file" accept="image/*" onChange={(e) => handleSettingsUpload(e, key)} />
                             </div>
                          ))}

                          <h4 style={{marginTop: 40, marginBottom: 15, color:'var(--primary)'}}>Category Banners</h4>
                          {['menCat', 'womenCat', 'kidsCat'].map((key) => (
                             <div className="form-group" style={{display:'flex', gap: 15, alignItems:'center'}} key={key}>
                                <div style={{width: 100, textTransform:'capitalize'}}>${key.replace('Cat', '')}</div>
                                <input className="form-input" style={{flex:1}} value={settingsForm[key]} onChange={e => setSettingsForm({...settingsForm, [key]: e.target.value})} placeholder="Image URL"/>
                                <input type="file" accept="image/*" onChange={(e) => handleSettingsUpload(e, key)} />
                             </div>
                          ))}

                          <h4 style={{marginTop: 40, marginBottom: 15, color:'var(--primary)'}}>Customer Gallery Highlights</h4>
                          {['custPhoto1', 'custPhoto2', 'custPhoto3', 'custPhoto4'].map((key, i) => (
                             <div className="form-group" style={{display:'flex', gap: 15, alignItems:'center'}} key={key}>
                                <div style={{width: 100}}>Photo ${i+1}</div>
                                <input className="form-input" style={{flex:1}} value={settingsForm[key]} onChange={e => setSettingsForm({...settingsForm, [key]: e.target.value})} placeholder="Image URL"/>
                                <input type="file" accept="image/*" onChange={(e) => handleSettingsUpload(e, key)} />
                             </div>
                          ))}

                          <button type="submit" className="btn btn-solid" style={{marginTop: 40, padding:'15px 30px', fontSize:'1.1rem'}}>Save Homepage Configuration</button>
                       </form>
                    </div>
                 )}
              </div>
           </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
